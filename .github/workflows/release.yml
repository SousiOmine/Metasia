name: Release

env:
    APP_NAME: MetasiaEditor
    DOTNET_VERSION: 10.0.x

on:
    push:
        tags: ['v*.*.*']

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 1

            - name: Setup dotnet
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore
              run: dotnet restore

            - name: Build
              run: dotnet build -c Release

            - name: Test
              run: dotnet test -c Release

    build:
        needs: test
        name: Build (${{ matrix.rid }})
        runs-on: ${{ matrix.os }}
        permissions:
            contents: write
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      preset: windows-x64
                      rid: win-x64
                    - os: ubuntu-latest
                      preset: linux-x64
                      rid: linux-x64
                    - os: macos-latest
                      preset: osx-arm64
                      rid: osx-arm64

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 1

            - name: Setup dotnet
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Setup task
              if: runner.os == 'macOS'
              uses: arduino/setup-task@v2
              with:
                repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract version from tag
              run: |
                VERSION=${GITHUB_REF#refs/tags/v}
                echo "VERSION=$VERSION" >> $GITHUB_ENV
                # Directory.Build.propsのバージョンを更新
                perl -i -pe "s|<Version>.*</Version>|<Version>$VERSION</Version>|" Directory.Build.props
                perl -i -pe "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${VERSION}.0</AssemblyVersion>|" Directory.Build.props
                perl -i -pe "s|<FileVersion>.*</FileVersion>|<FileVersion>${VERSION}.0</FileVersion>|" Directory.Build.props
              shell: bash

            - name: Update Info.plist (macOS)
              if: runner.os == 'macOS'
              run: |
                perl -0777 -i -pe "s|<key>CFBundleVersion</key>\n\t<string>1\.0\.0</string>|<key>CFBundleVersion</key>\n\t<string>$VERSION</string>|" Metasia.Editor/Assets/osx/Info.plist
                perl -0777 -i -pe "s|<key>CFBundleShortVersionString</key>\n\t<string>1\.0</string>|<key>CFBundleShortVersionString</key>\n\t<string>$VERSION</string>|" Metasia.Editor/Assets/osx/Info.plist
              shell: bash

            - name: Build
              if: runner.os != 'macOS'
              run: dotnet publish Metasia.Editor -c Release -r ${{ matrix.rid }} --self-contained -o ./output

            - name: Create release asset (Windows)
              if: runner.os == 'Windows'
              run: |
                powershell Compress-Archive -Path 'output/*' -DestinationPath '${{ env.APP_NAME }}-${{ matrix.preset }}.zip'
              shell: pwsh

            - name: Create release asset (Linux)
              if: runner.os == 'Linux'
              run: |
                  cd output && zip -r ../${{ env.APP_NAME }}-${{ matrix.preset }}.zip *
              shell: bash

            - name: Create release asset (macOS)
              if: runner.os == 'macOS'
              run: |
                  task macos-packaging
                  cd dist && zip -r ../${{ env.APP_NAME }}-${{ matrix.preset }}.zip *
              shell: bash

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: ${{ env.APP_NAME }}-${{ matrix.preset }}
                path: ${{ env.APP_NAME }}-${{ matrix.preset }}.zip

    release:
        needs: build
        name: Create GitHub Release
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Download release asset
              uses: actions/download-artifact@v4
              with:
                path: release-assets

            - name: Move release asset
              run: |
                mkdir -p upload
                find release-assets -name '*.zip' -exec cp {} upload/ \;
              shell: bash

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                files: upload/*.zip

    publish_packages:
        needs: [test, build]
        name: Publish NuGet Packages
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 1
                
            - name: Setup dotnet
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Extract version from tag
              run: |
                VERSION=${GITHUB_REF#refs/tags/v}
                echo "VERSION=$VERSION" >> $GITHUB_ENV
                # Directory.Build.propsのバージョンを更新
                perl -i -pe "s|<Version>.*</Version>|<Version>$VERSION</Version>|" Directory.Build.props
                perl -i -pe "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${VERSION}.0</AssemblyVersion>|" Directory.Build.props
                perl -i -pe "s|<FileVersion>.*</FileVersion>|<FileVersion>${VERSION}.0</FileVersion>|" Directory.Build.props
              shell: bash

            - name: Restore & build packages
              run: dotnet build -c Release

            - name: Push to NuGet
              run: |
                VERSION=${GITHUB_REF#refs/tags/v}
                dotnet pack Metasia.Core/Metasia.Core.csproj -c Release -o artifacts/packages -p:Version=$VERSION
                dotnet pack Metasia.Editor.Abstractions/Metasia.Editor.Abstractions.csproj -c Release -o artifacts/packages -p:Version=$VERSION
                dotnet pack Metasia.Editor.Plugin/Metasia.Editor.Plugin.csproj -c Release -o artifacts/packages -p:Version=$VERSION
                dotnet nuget push ./artifacts/packages/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

            - name: Upload packages
              uses: actions/upload-artifact@v4
              with:
                name: packages
                path: artifacts/packages
